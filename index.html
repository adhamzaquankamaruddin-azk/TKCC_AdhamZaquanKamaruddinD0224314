<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>D0224314 - TKCC</title>
    <style>
        body {
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        }
    </style>
</head>
<body>

    <h1>Daily Activity Tracker (Data Real)</h1>

    <label>Aktivitas:</label>
    <input type="text" id="mapia" placeholder="contoh: belajar, olahraga">

    <label>Durasi (menit):</label>
    <input type="number" id="wattu" value="30">

    <button onclick="pappaogau()">Tambah</button>

    <p id="total">Total: 0 menit (0 aktivitas)</p>

    <ol id="list"></ol>

    <script>
        let masae = 0;
        let pogau = 0;

        function pappaogau() {
            let mapia = document.getElementById("mapia").value;
            let wattu = parseInt(document.getElementById("wattu").value);

            if (mapia === "" || isNaN(wattu)) {
                return;
            }

            pogau++;
            masae += wattu;

            document.getElementById("total").innerText =
                `Total: ${masae} menit (${pogau} aktivitas)`;

                let li = document.createElement("li");
            li.innerText = `${mapia} - ${wattu} menit`;

            document.getElementById("list").appendChild(li);

            document.getElementById("mapia").value = "";
        }
    </script>

</body>
</html>
